                                            <div className="border-t border-white/10 pt-3 mt-2 space-y-3">
                                                <p className="section-label">Phông chữ</p>
                                                <div>
                                                    <span className="mb-1 block text-xs text-slate-400">Phông chữ tùy chỉnh (Google Fonts)</span>
                                                    <input type="text" placeholder="VD: Roboto, Oswald, Dancing Script..." value={settings.customFont} onChange={(e) => updateSetting('customFont', e.target.value)} className="glass-input w-full px-4 py-3 text-slate-100 outline-none" />
                                                </div>
                                                <label className="glass-card toggle-card flex items-center justify-between gap-3 cursor-pointer group rounded-[22px] p-3">
                                                    <span className="text-fuchsia-100 text-sm">Phông chữ Minecraft</span>
                                                    <input type="checkbox" checked={settings.isMinecraftFont} onChange={(e) => updateSetting('isMinecraftFont', e.target.checked)} className="ios-switch" style={{ '--switch-on': 'var(--neon-pink)' }} />
                                                </label>
                                            </div>

                                            <div className="border-t border-white/10 pt-3 mt-2">
                                                <p className="section-label mb-2">Nút trong popup kết quả</p>
                                                <label className="glass-card toggle-card flex items-center justify-between cursor-pointer group mb-2 rounded-[22px] p-3">
                                                    <span className="text-slate-200">Nút ẩn</span>
                                                    <input type="checkbox" checked={settings.showHideBtn} onChange={(e) => updateSetting('showHideBtn', e.target.checked)} className="ios-switch" />
                                                </label>
                                                <label className="glass-card toggle-card flex items-center justify-between cursor-pointer group rounded-[22px] p-3">
                                                    <span className="text-slate-200">Nút xóa</span>
                                                    <input type="checkbox" checked={settings.showDeleteBtn} onChange={(e) => updateSetting('showDeleteBtn', e.target.checked)} className="ios-switch" style={{ '--switch-on': '#ff6b6b' }} />
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Save Now Form */}
                                {activeModal === 'save' && (
                                    <div className="space-y-4">
                                        <h3 className="border-b border-white/10 pb-4 text-xl font-semibold text-white">Lưu bộ quay</h3>
                                        <div>
                                            <label className="mb-1 block text-xs text-slate-400">Tên bản lưu</label>
                                            <input type="text" value={tempSaveData.name} onChange={e => setTempSaveData({...tempSaveData, name: e.target.value})} placeholder={`Bản lưu ${saves.length + 1}`} className="glass-input w-full px-4 py-3 text-slate-100 outline-none" />
                                        </div>
                                        <div>
                                            <label className="mb-1 block text-xs text-slate-400">Ghi chú (không bắt buộc)</label>
                                            <textarea value={tempSaveData.note} onChange={e => setTempSaveData({...tempSaveData, note: e.target.value})} className="glass-input h-24 w-full resize-none px-4 py-3 text-slate-100 outline-none"></textarea>
                                        </div>
                                        <button onClick={initiateSave} className="glass-button mt-2 w-full py-3 font-semibold text-white transition">Lưu</button>
                                    </div>
                                )}

                                {/* Replace Save (>5) */}
                                {activeModal === 'replaceSave' && (
                                    <div className="space-y-4">
                                        <h3 className="border-b border-white/10 pb-4 text-xl font-semibold text-rose-200">Đã đầy số bản lưu</h3>
                                        <p className="text-sm text-slate-400">Chọn một bản lưu cũ để ghi đè.</p>
                                        <div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scroll">
                                            {saves.map(s => (
                                                <button key={s.id} onClick={() => handleExecuteSave(s.id)} className="glass-card w-full rounded-[22px] p-3 text-left transition group">
                                                    <div className="truncate font-semibold text-slate-100 group-hover:text-rose-200">{s.name}</div>
                                                    <div className="text-xs text-slate-400">{s.date}</div>
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={() => setActiveModal('save')} className="glass-button mt-2 w-full py-2.5 font-semibold text-slate-100">Quay lại</button>
                                    </div>
                                )}

                                {/* Load Save */}
                                {activeModal === 'load' && (
                                    <div className="space-y-4">
                                        <h3 className="border-b border-white/10 pb-4 text-xl font-semibold text-white">Tải bộ quay</h3>
                                        {saves.length === 0 ? <p className="glass-card rounded-[22px] py-6 text-center text-slate-400">Chưa có bản lưu nào</p> : (
                                            <div className="space-y-3 max-h-[60vh] overflow-y-auto custom-scroll pr-2">
                                                {saves.map(s => (
                                                    <button key={s.id} onClick={() => loadSave(s)} className="glass-card w-full rounded-[24px] p-4 text-left transition group">
                                                        <div className="mb-1 flex items-center justify-between gap-3">
                                                            <span className="min-w-0 truncate text-lg font-semibold text-slate-100">{s.name}</span>
                                                            <span className="glass-input shrink-0 px-2.5 py-1 text-[10px] text-slate-300">{s.data.entries?.length || 0} mục</span>
                                                        </div>
                                                        {s.note && <div className="mb-2 border-l-2 border-white/12 pl-3 text-xs text-slate-400 line-clamp-2 break-words">{s.note}</div>}
                                                        <div className="text-[10px] text-slate-400">{s.date}</div>
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* Manage Saves */}
                                {activeModal === 'manage' && (
                                    <div className="space-y-4">
                                        <h3 className="border-b border-white/10 pb-4 text-xl font-semibold text-white">Quản lý bản lưu</h3>
                                        {saves.length === 0 ? <p className="glass-card rounded-[22px] py-6 text-center text-slate-400">Chưa có bản lưu nào</p> : (
                                            <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2 custom-scroll">
                                                {saves.map(s => (
                                                    <div key={s.id} className="glass-card rounded-[24px] p-3.5">
                                                        <div className="mb-2 flex items-start justify-between gap-3">
                                                            <div className="min-w-0">
                                                                <div className="truncate font-semibold text-slate-100">{s.name}</div>
                                                                <div className="text-[10px] text-slate-400">{s.date}</div>
                                                            </div>
                                                            <button onClick={() => { if(window.confirm('Bạn có chắc muốn xóa bản lưu này không?')) deleteSave(s.id) }} className="glass-button shrink-0 p-2 text-rose-200 transition">
                                                                <IconTrash />
                                                            </button>
                                                        </div>
                                                        {s.note && <div className="glass-input rounded-[18px] p-3 text-xs text-slate-300">{s.note}</div>}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
